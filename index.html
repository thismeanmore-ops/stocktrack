<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StockTrack">
    <!-- ใช้ relative path สำหรับ manifest -->
    <link rel="manifest" href="./manifest.json">
    <title>StockTrack · Glassmorphism Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-gradient-start: #0f0c29;
            --bg-gradient-mid: #1a1a2e;
            --bg-gradient-end: #16213e;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-highlight: rgba(255, 255, 255, 0.03);
            --primary: #6C63FF;
            --primary-light: #8B84FF;
            --primary-dark: #5550CC;
            --secondary: #FF6584;
            --success: #00D68F;
            --danger: #FF4D4D;
            --warning: #FFB800;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 15px 40px rgba(0, 0, 0, 0.5);
            --blur-sm: blur(8px);
            --blur-md: blur(12px);
            --blur-lg: blur(20px);
        }

        body.light {
            --bg-gradient-start: #e0e0e0;
            --bg-gradient-mid: #f5f5f5;
            --bg-gradient-end: #ffffff;
            --glass-bg: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-highlight: rgba(0, 0, 0, 0.02);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(0, 0, 0, 0.7);
            --text-muted: rgba(0, 0, 0, 0.5);
            --primary: #5B52E8;
            --primary-light: #6C63FF;
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end));
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            transition: all 0.3s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(108, 99, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 101, 132, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Glass App Bar */
        .app-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            padding: 16px 24px;
            background: var(--glass-bg);
            backdrop-filter: var(--blur-md);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
        }

        .logo-area { display: flex; align-items: center; gap: 14px; }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(108, 99, 255, 0.5); }
        }

        .logo-icon svg { width: 28px; height: 28px; }

        .brand h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .brand p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        .install-prompt, .theme-toggle {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-sm);
            border: 1px solid var(--glass-border);
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .install-prompt {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
        }

        .install-prompt:hover, .theme-toggle:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-md);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--glass-highlight);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary-light);
        }

        /* Form Styles */
        .form-grid { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }

        .input-field { flex: 1 1 130px; min-width: 120px; }

        .input-field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field input, .input-field select {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            font-family: inherit;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field input:focus, .input-field select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }

        input::placeholder { color: var(--text-muted); }

        button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 14px;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            width: 100%;
            justify-content: center;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary-light);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .action-bar-top { display: flex; gap: 12px; margin-bottom: 20px; justify-content: flex-end; flex-wrap: wrap; }

        .file-label {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-sm);
            padding: 12px 20px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .file-label:hover {
            background: var(--glass-highlight);
            transform: translateY(-2px);
        }

        .recent-row {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            padding-top: 14px;
            border-top: 1px solid var(--glass-border);
        }

        .chip {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-sm);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .chip:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        /* Table Styles */
        .table-wrapper { overflow-x: auto; border-radius: 20px; margin: 0 -4px; }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }

        th {
            text-align: left;
            padding: 14px 12px;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--glass-border);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 12px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 13px;
        }

        .badge-buy {
            background: rgba(0, 214, 143, 0.15);
            color: #00D68F;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
            backdrop-filter: blur(4px);
        }

        .badge-sell {
            background: rgba(255, 77, 77, 0.15);
            color: #FF4D4D;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
            backdrop-filter: blur(4px);
        }

        .delete-icon {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--danger);
            padding: 6px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .delete-icon:hover {
            background: rgba(255, 77, 77, 0.2);
            transform: scale(1.05);
        }

        /* Stats Cards */
        .stats-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }

        .stat-card {
            flex: 1;
            min-width: 140px;
            background: var(--glass-bg);
            backdrop-filter: var(--blur-sm);
            border-radius: 24px;
            padding: 18px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .stat-card .label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
            margin-top: 4px;
            word-break: break-word;
        }

        .stat-card .sub-value {
            font-size: 11px;
            margin-top: 6px;
            opacity: 0.7;
        }

        .profit-green { color: #00D68F; }
        .loss-red { color: #FF4D4D; }

        /* Stock List */
        .stocks-list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }

        .stock-glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-sm);
            border-radius: 20px;
            padding: 16px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s ease;
        }

        .stock-glass-card:hover {
            transform: translateX(6px);
            box-shadow: var(--shadow-sm);
        }

        .stock-row-main {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .stock-ticker { font-size: 18px; font-weight: 700; }
        .stock-pnl { font-weight: 600; font-size: 14px; }

        .stock-detail-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--glass-border);
        }

        .detail-item { display: flex; flex-direction: column; gap: 4px; }

        .detail-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .detail-value { font-size: 13px; font-weight: 600; }

        /* Offline Indicator */
        .offline-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--danger), #cc0000);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }

        .offline-indicator.show { display: flex; }

        input[type="file"] { display: none; }

        @media (min-width: 768px) {
            body { padding: 24px; }
            .glass-card { padding: 24px; margin-bottom: 24px; }
            .card-title { font-size: 20px; margin-bottom: 20px; }
            .brand h1 { font-size: 26px; }
            .stat-card .value { font-size: 28px; }
            .stock-ticker { font-size: 20px; }
            .form-grid { gap: 16px; }
            button { width: auto; }
        }

        @media (min-width: 1024px) {
            .stat-card .value { font-size: 32px; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-bar">
        <div class="logo-area">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 13L8 8L13 12L21 4" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M3 17L8 12L13 16L21 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
                    <circle cx="3" cy="13" r="2" fill="white"/>
                    <circle cx="8" cy="8" r="2" fill="white"/>
                    <circle cx="13" cy="12" r="2" fill="white"/>
                    <circle cx="21" cy="4" r="2" fill="white"/>
                </svg>
            </div>
            <div class="brand">
                <h1>StockTrack</h1>
                <p>Glassmorphism Portfolio</p>
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="installBtn" class="install-prompt" style="display: none;">
                ✨ ติดตั้งแอป
            </button>
            <button class="theme-toggle" id="themeToggleBtn">
                <span id="themeIcon">🌙</span> <span id="themeText">Dark</span>
            </button>
        </div>
    </div>

    <div class="action-bar-top">
        <label class="file-label" for="loadFile">📂 โหลดข้อมูล</label>
        <input type="file" id="loadFile" accept=".json">
        <button id="saveBtn" class="btn-outline">💾 บันทึกข้อมูล</button>
    </div>

    <div class="glass-card">
        <div class="card-title">✨ เพิ่มธุรกรรมหุ้น</div>
        <div class="form-grid">
            <div class="input-field"><label>หุ้น</label><input type="text" id="stockName" placeholder="AAPL, NVDA"></div>
            <div class="input-field"><label>วันที่</label><input type="date" id="transDate"></div>
            <div class="input-field"><label>ประเภท</label><select id="transType"><option value="buy">🟢 ซื้อ</option><option value="sell">🔴 ขาย</option></select></div>
            <div class="input-field"><label>จำนวน</label><input type="number" id="shares" step="0.01" placeholder="Shares"></div>
            <div class="input-field"><label>ราคา (USD)</label><input type="number" id="pricePerShare" step="0.01" placeholder="USD"></div>
            <div class="input-field"><label>อัตรา THB</label><input type="number" id="exchangeRate" step="0.01" value="34.00"></div>
            <div class="input-field"><button id="addBtn">💾 บันทึกธุรกรรม</button></div>
        </div>
        <div class="recent-row">
            <span style="font-size: 11px; font-weight: 600; color: var(--text-secondary);">📌 ชื่อหุ้นล่าสุด:</span>
            <div id="recentChips" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
        </div>
    </div>

    <div class="glass-card" style="padding: 0; overflow: hidden;">
        <div style="padding: 20px 20px 0 20px;" class="card-title">📋 ประวัติธุรกรรม</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>หุ้น</th><th>วันที่</th><th>ประเภท</th><th>จำนวน</th><th>ราคา</th><th>เงินรวม</th><th></th></tr>
                </thead>
                <tbody id="txTableBody">
                    <tr><td colspan="7" style="text-align:center; padding:40px;">✨ ไม่มีข้อมูลธุรกรรม</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="glass-card">
        <div class="card-title">📊 สรุปพอร์ตการลงทุน</div>
        <div class="stats-row" id="mainStats"></div>
        <div style="margin-top: 20px;">
            <div style="font-weight: 600; margin-bottom: 14px; font-size: 13px; color: var(--text-secondary);">📁 รายละเอียดแยกตามหุ้น</div>
            <div id="stocksDetailedList" class="stocks-list"></div>
        </div>
        <div style="font-size: 11px; margin-top: 18px; opacity: 0.6; text-align: center;">* คำนวณแบบ FIFO · กำไร/ขาดทุนเกิดขึ้นจริงเมื่อขาย</div>
    </div>
</div>

<div id="offlineIndicator" class="offline-indicator">⚠️ คุณกำลังออฟไลน์</div>

<script>
    (function() {
        // ========== PWA Installation ==========
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'inline-flex';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // ========== Offline Detection ==========
        function updateOfflineStatus() {
            const indicator = document.getElementById('offlineIndicator');
            if (!navigator.onLine) indicator.classList.add('show');
            else indicator.classList.remove('show');
        }

        window.addEventListener('load', updateOfflineStatus);
        window.addEventListener('online', updateOfflineStatus);
        window.addEventListener('offline', updateOfflineStatus);

        // ========== Application Logic ==========
        let transactions = [];

        function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 6); }
        function formatMoney(v) { return v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ","); }
        function getExchangeRate() { let r = parseFloat(document.getElementById('exchangeRate').value); return (isNaN(r) || r <= 0) ? 34 : r; }

        function addTransaction(stock, date, type, shares, priceUSD, exRate) {
            if (!stock || !date || !shares || !priceUSD || shares <= 0 || priceUSD <= 0 || exRate <= 0) {
                alert("⚠️ กรุณากรอกข้อมูลให้ครบถ้วน");
                return false;
            }
            transactions.push({ 
                id: generateId(), 
                stock: stock.trim().toUpperCase(), 
                date, type, 
                shares: parseFloat(shares), 
                priceUSD: parseFloat(priceUSD), 
                exchangeRate: parseFloat(exRate) 
            });
            saveToLocal();
            renderAll();
            return true;
        }

        function deleteTx(id) { transactions = transactions.filter(t => t.id !== id); saveToLocal(); renderAll(); }
        function saveToLocal() { localStorage.setItem('stocktrack_glass', JSON.stringify(transactions)); }
        
        function loadFromLocal() { 
            const d = localStorage.getItem('stocktrack_glass'); 
            if (d) { try { transactions = JSON.parse(d); } catch(e) {} } 
            else { transactions = []; } 
            renderAll(); 
        }

        function calcPortfolio() {
            const sorted = [...transactions].sort((a, b) => new Date(a.date) - new Date(b.date));
            const groups = new Map();
            
            for (let tx of sorted) {
                if (!groups.has(tx.stock)) groups.set(tx.stock, { lotsUSD: [], lotsTHB: [], realizedUSD: 0, realizedTHB: 0 });
                const g = groups.get(tx.stock);
                const priceTHB = tx.priceUSD * tx.exchangeRate;
                
                if (tx.type === 'buy') {
                    g.lotsUSD.push({ shares: tx.shares, price: tx.priceUSD });
                    g.lotsTHB.push({ shares: tx.shares, price: priceTHB });
                } else {
                    let sellUSD = tx.shares, sellTHB = tx.shares, rUSD = 0, rTHB = 0;
                    while (sellUSD > 0 && g.lotsUSD.length) {
                        const lot = g.lotsUSD[0];
                        const used = Math.min(lot.shares, sellUSD);
                        rUSD += (tx.priceUSD - lot.price) * used;
                        lot.shares -= used;
                        if (lot.shares <= 0.0001) g.lotsUSD.shift();
                        sellUSD -= used;
                    }
                    while (sellTHB > 0 && g.lotsTHB.length) {
                        const lot = g.lotsTHB[0];
                        const used = Math.min(lot.shares, sellTHB);
                        rTHB += (priceTHB - lot.price) * used;
                        lot.shares -= used;
                        if (lot.shares <= 0.0001) g.lotsTHB.shift();
                        sellTHB -= used;
                    }
                    g.realizedUSD += rUSD;
                    g.realizedTHB += rTHB;
                }
            }
            
            let totalCostUSD = 0, totalCostTHB = 0, totalRealUSD = 0, totalRealTHB = 0;
            const holdings = [];
            for (let [stock, g] of groups.entries()) {
                let sharesLeft = 0, costUSD = 0, costTHB = 0;
                for (let lot of g.lotsUSD) if (lot.shares > 0) { sharesLeft += lot.shares; costUSD += lot.shares * lot.price; }
                for (let lot of g.lotsTHB) if (lot.shares > 0) costTHB += lot.shares * lot.price;
                const avgUSD = sharesLeft > 0 ? costUSD / sharesLeft : 0;
                const avgTHB = sharesLeft > 0 ? costTHB / sharesLeft : 0;
                holdings.push({ stock, shares: sharesLeft, costUSD, costTHB, avgUSD, avgTHB, realizedUSD: g.realizedUSD, realizedTHB: g.realizedTHB });
                totalCostUSD += costUSD;
                totalCostTHB += costTHB;
                totalRealUSD += g.realizedUSD;
                totalRealTHB += g.realizedTHB;
            }
            return { holdings, totalCostUSD, totalCostTHB, netUSD: totalCostUSD + totalRealUSD, netTHB: totalCostTHB + totalRealTHB, totalRealUSD, totalRealTHB };
        }

        function updateRecentStocks() {
            const list = [...new Map(transactions.map(t => [t.stock, t.date]).sort((a, b) => new Date(b[1]) - new Date(a[1]))).keys()].slice(0, 5);
            const container = document.getElementById('recentChips');
            if (list.length === 0) { container.innerHTML = '<span>ไม่มีข้อมูล</span>'; return; }
            container.innerHTML = list.map(s => `<span class="chip" data-stock="${s}">${s}</span>`).join('');
            document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => document.getElementById('stockName').value = c.getAttribute('data-stock')));
        }

        function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

        function renderAll() {
            const tbody = document.getElementById('txTableBody');
            if (!transactions.length) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px;">✨ ไม่มีข้อมูลธุรกรรม</td></tr>';
            } else {
                tbody.innerHTML = transactions.map(tx => {
                    const usdTotal = tx.priceUSD * tx.shares;
                    const thbTotal = usdTotal * tx.exchangeRate;
                    return `<tr>
                        <td><strong>${escapeHtml(tx.stock)}</strong></td>
                        <td>${tx.date}</td>
                        <td><span class="${tx.type === 'buy' ? 'badge-buy' : 'badge-sell'}">${tx.type === 'buy' ? '🟢 ซื้อ' : '🔴 ขาย'}</span></td>
                        <td>${tx.shares.toFixed(2)}</td>
                        <td>$${formatMoney(tx.priceUSD)}</td>
                        <td>$${formatMoney(usdTotal)}<br><span style="font-size:10px;">≈ ฿${formatMoney(thbTotal)}</span></td>
                        <td><button class="delete-icon" data-id="${tx.id}">🗑️</button></td>
                    </tr>`;
                }).join('');
                document.querySelectorAll('.delete-icon').forEach(btn => btn.addEventListener('click', () => deleteTx(btn.getAttribute('data-id'))));
            }
            
            const stats = calcPortfolio();
            document.getElementById('mainStats').innerHTML = `
                <div class="stat-card"><div class="label">💰 ต้นทุนคงเหลือ</div><div class="value">$${formatMoney(stats.totalCostUSD)}</div><div class="sub-value">≈ ฿${formatMoney(stats.totalCostTHB)}</div></div>
                <div class="stat-card"><div class="label">📈 มูลค่าสุทธิ</div><div class="value">$${formatMoney(stats.netUSD)}</div><div class="sub-value">≈ ฿${formatMoney(stats.netTHB)}</div></div>
                <div class="stat-card"><div class="label">📊 กำไร/ขาดทุน</div><div class="value ${stats.totalRealUSD >= 0 ? 'profit-green' : 'loss-red'}">${stats.totalRealUSD >= 0 ? '+' : ''}$${formatMoney(stats.totalRealUSD)}</div><div class="sub-value ${stats.totalRealTHB >= 0 ? 'profit-green' : 'loss-red'}">${stats.totalRealTHB >= 0 ? '+' : ''}฿${formatMoney(stats.totalRealTHB)}</div></div>
            `;
            
            const allStocks = new Map();
            for (let tx of transactions) { if (!allStocks.has(tx.stock)) allStocks.set(tx.stock, []); allStocks.get(tx.stock).push(tx); }
            
            const finalStocks = [];
            for (let [stock, txs] of allStocks.entries()) {
                const sortedTx = [...txs].sort((a, b) => new Date(a.date) - new Date(b.date));
                let lotsUSD = [], lotsTHB = [], realizedUSD = 0, realizedTHB = 0;
                for (let tx of sortedTx) {
                    const pTHB = tx.priceUSD * tx.exchangeRate;
                    if (tx.type === 'buy') {
                        lotsUSD.push({ shares: tx.shares, price: tx.priceUSD });
                        lotsTHB.push({ shares: tx.shares, price: pTHB });
                    } else {
                        let rUSD = 0, rTHB = 0, sell = tx.shares, sellB = tx.shares;
                        while (sell > 0 && lotsUSD.length) {
                            const l = lotsUSD[0];
                            const u = Math.min(l.shares, sell);
                            rUSD += (tx.priceUSD - l.price) * u;
                            l.shares -= u;
                            if (l.shares <= 0.0001) lotsUSD.shift();
                            sell -= u;
                        }
                        while (sellB > 0 && lotsTHB.length) {
                            const l = lotsTHB[0];
                            const u = Math.min(l.shares, sellB);
                            rTHB += (pTHB - l.price) * u;
                            l.shares -= u;
                            if (l.shares <= 0.0001) lotsTHB.shift();
                            sellB -= u;
                        }
                        realizedUSD += rUSD;
                        realizedTHB += rTHB;
                    }
                }
                let leftShares = 0, costUSD = 0, costTHB = 0;
                for (let l of lotsUSD) if (l.shares > 0) { leftShares += l.shares; costUSD += l.shares * l.price; }
                for (let l of lotsTHB) if (l.shares > 0) costTHB += l.shares * l.price;
                const avgUSD = leftShares > 0 ? costUSD / leftShares : 0;
                const avgTHB = leftShares > 0 ? costTHB / leftShares : 0;
                finalStocks.push({ stock, shares: leftShares, costUSD, costTHB, avgUSD, avgTHB, realizedUSD, realizedTHB });
            }
            
            const stocksDiv = document.getElementById('stocksDetailedList');
            if (finalStocks.length === 0) {
                stocksDiv.innerHTML = '<div style="padding:30px; text-align:center;">✨ ไม่มีข้อมูลพอร์ต</div>';
            } else {
                stocksDiv.innerHTML = finalStocks.map(s => {
                    const pnlClass = s.realizedUSD >= 0 ? 'profit-green' : 'loss-red';
                    const hasShares = s.shares > 0;
                    return `<div class="stock-glass-card">
                        <div class="stock-row-main">
                            <div class="stock-ticker">📈 ${s.stock}</div>
                            <div class="stock-pnl ${pnlClass}">${s.realizedUSD >= 0 ? '+' : ''}$${formatMoney(s.realizedUSD)} (${s.realizedTHB >= 0 ? '+' : ''}฿${formatMoney(s.realizedTHB)})</div>
                        </div>
                        <div class="stock-detail-row">
                            <div class="detail-item"><div class="detail-label">📦 คงเหลือ</div><div class="detail-value">${s.shares.toFixed(2)} หุ้น</div></div>
                            <div class="detail-item"><div class="detail-label">💰 ต้นทุนเฉลี่ย</div><div class="detail-value">${hasShares ? '$' + formatMoney(s.avgUSD) : '-'} / ${hasShares ? '฿' + formatMoney(s.avgTHB) : '-'}</div></div>
                            <div class="detail-item"><div class="detail-label">💵 มูลค่าคงเหลือ</div><div class="detail-value">$${formatMoney(s.costUSD)} / ฿${formatMoney(s.costTHB)}</div></div>
                            <div class="detail-item"><div class="detail-label">📌 สถานะ</div><div class="detail-value">${hasShares ? 'ถือครอง' : 'ขายหมด'}</div></div>
                        </div>
                    </div>`;
                }).join('');
            }
            updateRecentStocks();
        }

        function initTheme() {
            const dark = localStorage.getItem('glassTheme') !== 'light';
            if (!dark) document.body.classList.add('light');
            const btn = document.getElementById('themeToggleBtn');
            const themeText = document.getElementById('themeText');
            const themeIcon = document.getElementById('themeIcon');
            
            const updateTheme = () => {
                const isDark = !document.body.classList.contains('light');
                themeText.innerText = isDark ? 'Light' : 'Dark';
                themeIcon.innerText = isDark ? '☀️' : '🌙';
            };
            
            btn.addEventListener('click', () => {
                document.body.classList.toggle('light');
                const isDark = !document.body.classList.contains('light');
                localStorage.setItem('glassTheme', isDark ? 'dark' : 'light');
                updateTheme();
            });
            updateTheme();
        }

        document.getElementById('addBtn').addEventListener('click', () => {
            const stock = document.getElementById('stockName').value;
            const date = document.getElementById('transDate').value;
            const type = document.getElementById('transType').value;
            const shares = parseFloat(document.getElementById('shares').value);
            const price = parseFloat(document.getElementById('pricePerShare').value);
            const rate = getExchangeRate();
            if (!date) { alert("⚠️ กรุณาเลือกวันที่"); return; }
            if (addTransaction(stock, date, type, shares, price, rate)) {
                document.getElementById('shares').value = '';
                document.getElementById('pricePerShare').value = '';
                document.getElementById('stockName').focus();
            }
        });
        
        document.getElementById('saveBtn').addEventListener('click', () => {
            if (transactions.length === 0) { alert("⚠️ ไม่มีข้อมูล"); return; }
            const data = JSON.stringify(transactions, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const a = document.createElement('a');
            a.download = `stocktrack_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.json`;
            a.href = URL.createObjectURL(blob);
            a.click();
            URL.revokeObjectURL(a.href);
        });
        
        document.getElementById('loadFile').addEventListener('change', (e) => {
            if (e.target.files.length) {
                const reader = new FileReader();
                reader.onload = (ev) => { 
                    try { 
                        const d = JSON.parse(ev.target.result); 
                        if (Array.isArray(d)) { 
                            transactions = d; 
                            saveToLocal(); 
                            renderAll(); 
                            alert("✅ โหลดข้อมูลสำเร็จ"); 
                        } else { 
                            alert("⚠️ รูปแบบข้อมูลไม่ถูกต้อง"); 
                        } 
                    } catch(e) { 
                        alert("⚠️ ไฟล์ JSON เสียหาย"); 
                    } 
                };
                reader.readAsText(e.target.files[0]);
            }
            e.target.value = '';
        });
        
        document.getElementById('transDate').value = new Date().toISOString().slice(0, 10);
        loadFromLocal();
        initTheme();
    })();
</script>
</body>
</html>
